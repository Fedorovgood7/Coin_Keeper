services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coinkeeper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SERVER_HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: coinkeeper
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
      JWT_TOKEN_DURATION_HOURS: 24
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-demo-client-id}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-demo-client-secret}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-http://localhost:3000/api/v1/auth/yandex/callback}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
